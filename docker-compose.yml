services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: agent_sandbox
      POSTGRES_PASSWORD: sandbox
      POSTGRES_USER: sandbox
    ports:
      - "54320:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sandbox -d agent_sandbox"]
      interval: 2s
      timeout: 5s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql/data

  app:
    build: .
    environment:
      DATABASE_URL: postgres://sandbox:sandbox@db:5432/agent_sandbox
      PORT: "3000"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    command: sh -c "npm run db:migrate && npm run db:seed && node dist/server.js"

  test:
    build: .
    environment:
      DATABASE_URL: postgres://sandbox:sandbox@db:5432/agent_sandbox
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "npm run db:migrate && npm test"

volumes:
  postgres-data:
